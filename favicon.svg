<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark blue outer border -->
  <rect width="32" height="32" rx="4" fill="#000080" />
  <!-- Beveled grey computer case -->
  <rect x="4" y="4" width="24" height="24" rx="2" fill="#c0c0c0" />
  <!-- 3D inset borders for screen area -->
  <rect x="6" y="6" width="20" height="14" fill="#808080" />
  <!-- CRT black monitor screen -->
  <rect x="7" y="7" width="18" height="12" fill="#000000" />
  <!-- Green phosphor terminal prompt lines -->
  <rect x="9" y="9" width="10" height="2" fill="#33ff33" />
  <rect x="9" y="13" width="14" height="2" fill="#33ff33" />
  <!-- Floppy disk drive slot details (lower bezel) -->
  <rect x="8" y="22" width="16" height="3" fill="#808080" />
  <rect x="9" y="23" width="10" height="1" fill="#000000" />
  <rect x="21" y="23" width="2" height="1" fill="#ff3333" /> <!-- LED Indicator -->
</svg>
